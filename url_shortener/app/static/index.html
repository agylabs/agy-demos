<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIPLINK | Premium URL Shortener</title>
    <!-- Modern Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- Zero-dependency QR Code Generator via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" integrity="sha512-CNgAWRRwi3664c78U7fP8uRshK6N6A== " crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
    <div class="bg-glow bg-glow-blue"></div>
    <div class="bg-glow bg-glow-violet"></div>

    <div class="container">
        <!-- Brand Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>ZIPLINK</h1>
            </div>
            <p class="subtitle">Elevate your links. Track interactions. Inspire engagement.</p>
        </header>

        <!-- Shorten Input Card -->
        <section class="card shorten-card">
            <form id="shorten-form" class="shorten-form">
                <div class="input-group">
                    <label for="original_url">Destination URL</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔗</span>
                        <input type="url" id="original_url" placeholder="https://example.com/very-long-landing-page-url" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="custom_alias">Custom Alias <span class="label-optional">(Optional)</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">✏️</span>
                            <input type="text" id="custom_alias" placeholder="promo-2026" minlength="3" maxlength="30" pattern="^[a-zA-Z0-9_-]+$">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="expires_in_minutes">Expiration <span class="label-optional">(Optional)</span></label>
                        <div class="input-wrapper">
                            <span class="input-icon">⏳</span>
                            <select id="expires_in_minutes">
                                <option value="">Never Expires</option>
                                <option value="5">5 Minutes</option>
                                <option value="60">1 Hour</option>
                                <option value="1440">1 Day</option>
                                <option value="10080">1 Week</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary">
                    <span class="btn-text">Shorten Link</span>
                    <span class="btn-loader hidden"></span>
                </button>
            </form>
        </section>

        <!-- Analytics Dashboard Card -->
        <section class="card dashboard-card">
            <div class="dashboard-header">
                <h2>Active Links & Analytics</h2>
                <button id="refresh-btn" class="btn btn-secondary btn-icon-only" title="Refresh list">🔄</button>
            </div>
            
            <div class="table-container">
                <table class="links-table">
                    <thead>
                        <tr>
                            <th>Short Link</th>
                            <th>Destination</th>
                            <th>Clicks</th>
                            <th>Last Accessed</th>
                            <th>Expiration</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="links-tbody">
                        <tr>
                            <td colspan="6" class="table-empty">Loading active short links...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- QR Code Modal Dialog -->
    <div id="qr-modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>QR Code Directory</h3>
                <button id="close-modal-btn" class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <p id="qr-url-display" class="qr-url-text"></p>
                <div class="qr-container">
                    <div id="qrcode"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="download-qr-btn" class="btn btn-primary">Download Image</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Handler -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
